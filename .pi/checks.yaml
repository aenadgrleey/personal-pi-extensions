# checks.yaml — declarative check definitions
# Compatibility copy for repos that still keep checks under .pi/.
# Prefer checks.yaml at the repository root for new setups.

checks:
  - name: format
    command: bun run format
    description: Auto-fix formatting

  - name: check-extension-build
    command: bun build pi-extensions/check.ts --target=node --outfile=/tmp/pi-check-extension.js
    description: Smoke-build the check extension

  - name: rtango
    command: rtango status --ignore-fetch-failures
    description: Verify rtango-managed skills are in sync
