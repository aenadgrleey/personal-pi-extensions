version: "1"

steps:
  - id: initial-implementation
    agent: worker
    task: |
      Implement:
      {{input}}
    output:
      kind: report
    tools:
      mode: allowlist
      allow: [read, bash, edit, write]

  - id: fix-loop
    loop:
      max_iterations: 3
      steps:
        - id: apply-feedback
          agent: worker
          task: |
            Improve the implementation using the latest review feedback.

            Previous summary:
            {{prev.summary}}

            Previous feedback:
            {{prev.feedback}}
          output:
            kind: report
          tools:
            mode: allowlist
            allow: [read, bash, edit, write]

        - id: reviewer
          agent: reviewer
          task: |
            Review the current implementation and return approval decision with feedback.
          output:
            kind: review
    review: true

